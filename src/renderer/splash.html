<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>JARVIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:520px;height:420px;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Courier New",monospace;overflow:hidden;-webkit-app-region:drag;}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,#001428 0%,#000810 60%,transparent 100%);border-radius:16px;border:1px solid rgba(0,180,255,0.15);}
.reactor{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;z-index:1;}
.ring{position:absolute;border-radius:50%;border:2px solid transparent;animation:spin linear infinite;}
.r1{width:190px;height:190px;border-top-color:rgba(0,212,255,0.8);border-right-color:rgba(0,212,255,0.3);animation-duration:4s;}
.r2{width:160px;height:160px;border-bottom-color:rgba(0,170,255,0.7);border-left-color:rgba(0,170,255,0.2);animation-duration:3s;animation-direction:reverse;}
.r3{width:130px;height:130px;border-top-color:rgba(100,220,255,0.6);border-right-color:rgba(100,220,255,0.2);animation-duration:5s;}
.r4{width:100px;height:100px;border-bottom-color:rgba(0,212,255,0.5);animation-duration:2s;animation-direction:reverse;}
.core{position:absolute;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,#ffffff 0%,#a0eeff 30%,#00d4ff 60%,#0066aa 100%);box-shadow:0 0 20px #00d4ff,0 0 40px #00d4ff,0 0 80px rgba(0,212,255,0.5);animation:corePulse 2s ease-in-out infinite;}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;background:#00d4ff;opacity:0;animation:float linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes corePulse{0%,100%{box-shadow:0 0 20px #00d4ff,0 0 40px #00d4ff,0 0 80px rgba(0,212,255,0.5);}50%{box-shadow:0 0 30px #00d4ff,0 0 60px #00d4ff,0 0 120px rgba(0,212,255,0.8);}}
@keyframes float{0%{opacity:0;transform:translateY(0) scale(1);}20%{opacity:1;}80%{opacity:0.5;}100%{opacity:0;transform:translateY(-80px) scale(0);}}
.info{position:relative;z-index:1;text-align:center;margin-top:20px;}
.title{font-size:22px;letter-spacing:8px;color:#00d4ff;text-shadow:0 0 20px rgba(0,212,255,0.8);font-weight:bold;}
.sub{font-size:9px;letter-spacing:4px;color:rgba(0,180,255,0.5);margin-top:4px;}
.status-box{margin-top:18px;width:320px;}
.bar-bg{height:2px;background:rgba(0,180,255,0.1);border-radius:2px;overflow:hidden;}
.bar{height:100%;background:linear-gradient(90deg,#00d4ff,#0066ff);width:0%;transition:width 0.4s ease;border-radius:2px;box-shadow:0 0 8px #00d4ff;}
.status-text{font-size:10px;color:rgba(0,180,255,0.7);letter-spacing:2px;margin-top:8px;min-height:14px;text-align:center;}
.ver{position:absolute;bottom:16px;right:20px;font-size:8px;color:rgba(0,180,255,0.3);letter-spacing:2px;z-index:1;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="reactor">
  <div class="ring r1"></div><div class="ring r2"></div>
  <div class="ring r3"></div><div class="ring r4"></div>
  <div class="core"></div>
  <div id="particles" style="position:absolute;inset:0;"></div>
</div>
<div class="info">
  <div class="title">J.A.R.V.I.S.</div>
  <div class="sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
  <div class="status-box">
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <div class="status-text" id="st">Initializing...</div>
  </div>
</div>
<div class="ver">v1.0.0</div>
<script>
const pc=document.getElementById("particles");
for(let i=0;i<20;i++){const p=document.createElement("div");p.className="particle";const a=Math.random()*360,r=60+Math.random()*40;p.style.left=(50+r*Math.cos(a*Math.PI/180))+"%";p.style.top=(50+r*Math.sin(a*Math.PI/180))+"%";p.style.animationDuration=(2+Math.random()*3)+"s";p.style.animationDelay=(Math.random()*3)+"s";pc.appendChild(p);}
const bar=document.getElementById("bar"),st=document.getElementById("st");
let pct=0;
if(window.JARVIS){window.JARVIS.onStatus(msg=>{st.textContent=msg;pct=Math.min(95,pct+9);bar.style.width=pct+"%";});}
else{const steps=["Initializing...","Checking for updates...","Loading core modules...","Initializing voice system...","Connecting AI core...","Loading memory system...","Finalizing interface..."];let i=0;setInterval(()=>{if(i<steps.length){st.textContent=steps[i++];pct=Math.min(95,pct+13);bar.style.width=pct+"%";}},700);}
</script>
</body>
</html>
